name: Build SukiSU Ultra

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git bc bison flex libssl-dev make libelf-dev zip curl python3 lz4 zstd gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf clang-14 lld-14 llvm-14
          clang-14 --version

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 kernel_source

      - name: Integrate SukiSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main

      - name: Enable KPM
        run: |
          D="kernel_source/arch/arm64/configs/cust_defconfig"
          grep -q "CONFIG_KPM=y" "$D" || echo "CONFIG_KPM=y" >> "$D"
          grep -q "CONFIG_KALLSYMS=y" "$D" || echo "CONFIG_KALLSYMS=y" >> "$D"
          grep -q "CONFIG_KALLSYMS_ALL=y" "$D" || echo "CONFIG_KALLSYMS_ALL=y" >> "$D"
          
          # Вимикаємо BPF (конфліктує зі збіркою)
          sed -i '/CONFIG_BPF=/d' "$D"
          echo "CONFIG_BPF=n" >> "$D"
          
          # Вимикаємо BPF статистику
          sed -i '/CONFIG_BPF_SYSCALL=/d' "$D"
          echo "CONFIG_BPF_SYSCALL=n" >> "$D"
          
          # SUSFS конфіги
          echo "CONFIG_SUSFS=y" >> "$D"
          echo "CONFIG_SUSFS_SUS_PATH=y" >> "$D"
          echo "CONFIG_SUSFS_VNODE_MASK=y" >> "$D"
          echo "CONFIG_SUSFS_TRY_UMOUNT=y" >> "$D"
          echo "CONFIG_SUSFS_SPOOF_UNAME=y" >> "$D"
          echo "CONFIG_SUSFS_ENABLE_LOG=y" >> "$D"
          echo "CONFIG_SUSFS_HIDE_PORTS=y" >> "$D"
          
          tail -20 "$D"

      - name: Build
        run: |
          set -e
          cd kernel_source
          
          make O=out ARCH=arm64 cust_defconfig

          # 1. Фікс для асемблера entry.S
          sed -i 's/.*ValidContext.*/ValidContext:/g' arch/arm64/kernel/entry.S

          # 2. Видаляємо посилання на bpf_stats_handler
          sed -i '/bpf_stats_handler/d' kernel/sysctl.c
          sed -i 's/.*bpf_stats.*//g' include/linux/bpf.h

          # 3. Впровадження susfs.o
          if [ -f fs/Makefile ]; then
            if ! grep -q "obj-y += susfs.o" fs/Makefile; then
              echo "obj-y += susfs.o" >> fs/Makefile
              echo "✓ Впроваджено susfs.o в fs/Makefile"
            fi
          fi

          # 4. Запускаємо збірку ядра
          echo "=== Запуск компіляції ядра ==="
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="clang-14 -DValidContext= -DValidContext:= -DBIO_MAX_PAGES=256 -Wno-implicit-function-declaration -Wno-error -Dsusfs_is_vnode_masked\(x\)=0" \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=0 \
            KCFLAGS="-Dcompat_uptr_t=__u32 -Wno-error" \
            AFLAGS="-Wa,-W" \
            Image dtbs 2>&1 | tee ../build.log

          # Перевіряємо помилки в логах
          if grep -i "error:" ../build.log; then
            echo "❌ КРИТИЧНІ ПОМИЛКИ ЗНАЙДЕНІ В ЛОГАХ:"
            grep -i "error:" ../build.log | head -30
            exit 1
          fi

          echo "=== Перевірка вихідних файлів ==="
          ls -lh out/arch/arm64/boot/

          # Перевіряємо що ядро зібралося успішно
          if [ ! -f out/arch/arm64/boot/Image ] && [ ! -f out/arch/arm64/boot/Image.gz ] && [ ! -f out/arch/arm64/boot/Image-dtb ]; then
            echo "❌ ПОМИЛКА: Ядро не зібралося! Жоден Image файл не знайдено."
            exit 1
          fi
          
          echo "✓ Ядро зібрано успішно!"
          
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 3

      - name: Package
        run: |
          set -e
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          # Динамічна перевірка: якщо зібрався Image, стискаємо його в Image.gz вручну
          if [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            echo "✓ Знайдено нестиснуте ядро Image, стискаємо в Image.gz..."
            gzip -c9 kernel_source/out/arch/arm64/boot/Image > AnyKernel3/Image.gz
          elif [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            echo "✓ Знайдено готове Image.gz, копіюємо..."
            cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          elif [ -f kernel_source/out/arch/arm64/boot/Image-dtb ]; then
            echo "✓ Знайдено вшитий Image-dtb, стискаємо в Image.gz..."
            gzip -c9 kernel_source/out/arch/arm64/boot/Image-dtb > AnyKernel3/Image.gz
          else
            echo "❌ КРИТИЧНА ПОМИЛКА: жодного файлу ядра не знайдено!"
            exit 1
          fi

          # Збираємо dtb, якщо вони скомпілювалися окремо
          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" -exec cat {} >> AnyKernel3/dtb \; 2>/dev/null || true

          cd AnyKernel3
          zip -r9 "../SukiSU-joyeuse.zip" . -x ".git*"
          cd ..
          ls -lh *.zip
          
          echo "✓ Пакет готовий для завантаження!"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-joyeuse-${{ github.run_number }}
          path: "*.zip"
          retention-days: 7
