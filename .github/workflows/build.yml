name: Build SukiSU Ultra

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git bc bison flex libssl-dev make libelf-dev zip curl python3 lz4 zstd gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf clang-14 lld-14 llvm-14
          clang-14 --version

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 kernel_source

      - name: Integrate SukiSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main

      - name: Enable KPM & SUSFS Config
        run: |
          D="kernel_source/arch/arm64/configs/cust_defconfig"
          
          # Основні конфіги
          grep -q "CONFIG_KPM=y" "$D" || echo "CONFIG_KPM=y" >> "$D"
          grep -q "CONFIG_KALLSYMS=y" "$D" || echo "CONFIG_KALLSYMS=y" >> "$D"
          grep -q "CONFIG_KALLSYMS_ALL=y" "$D" || echo "CONFIG_KALLSYMS_ALL=y" >> "$D"
          
          # SUSFS конфіги (тільки якщо їх ще нема)
          grep -q "CONFIG_SUSFS=y" "$D" || echo "CONFIG_SUSFS=y" >> "$D"
          grep -q "CONFIG_SUSFS_SUS_PATH=y" "$D" || echo "CONFIG_SUSFS_SUS_PATH=y" >> "$D"
          grep -q "CONFIG_SUSFS_VNODE_MASK=y" "$D" || echo "CONFIG_SUSFS_VNODE_MASK=y" >> "$D"
          grep -q "CONFIG_SUSFS_TRY_UMOUNT=y" "$D" || echo "CONFIG_SUSFS_TRY_UMOUNT=y" >> "$D"
          grep -q "CONFIG_SUSFS_SPOOF_UNAME=y" "$D" || echo "CONFIG_SUSFS_SPOOF_UNAME=y" >> "$D"
          grep -q "CONFIG_SUSFS_ENABLE_LOG=y" "$D" || echo "CONFIG_SUSFS_ENABLE_LOG=y" >> "$D"
          grep -q "CONFIG_SUSFS_HIDE_PORTS=y" "$D" || echo "CONFIG_SUSFS_HIDE_PORTS=y" >> "$D"
          
          echo "=== Конфіг готовий ==="
          tail -20 "$D"

      - name: Build
        run: |
          set -e
          cd kernel_source
          
          make O=out ARCH=arm64 cust_defconfig

          # 1. Фікс для асемблера entry.S (перевірений, працює)
          sed -i 's/.*ValidContext.*/ValidContext:/g' arch/arm64/kernel/entry.S

          # 2. Впровадження susfs.o у fs/Makefile
          if [ -f fs/Makefile ]; then
            if ! grep -q "obj-y += susfs.o" fs/Makefile; then
              echo "obj-y += susfs.o" >> fs/Makefile
              echo "✓ Впроваджено susfs.o в fs/Makefile"
            fi
          fi

          # 3. Запускаємо збірку ядра
          echo "=== Запуск компіляції ядра ==="
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="clang-14 -DValidContext= -DValidContext:= -DBIO_MAX_PAGES=256 -Wno-implicit-function-declaration -Wno-error" \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=0 \
            KCFLAGS="-](#)
