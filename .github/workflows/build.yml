# ============================================================
#  GitHub Actions — Build SukiSU Ultra + SUSFS + KPM
#  ROM: PixelOS 16.2 (sixteen-qpr2)
#  Device: Redmi Note 9 Pro (joyeuse) | Kernel: sm6250 / 4.14
# ============================================================
#
#  ЩО ВХОДИТЬ:
#  • SukiSU Ultra  — kernel-level root (форк KernelSU)
#  • SUSFS         — вбудоване приховування root (гілка susfs-main)
#  • KPM           — Kernel Patch Module (патчинг ядра в рантаймі)
#
#  ВИМОГИ ДО ЯДРА (4.14, non-GKI):
#  • CONFIG_KPM=y
#  • CONFIG_KALLSYMS=y
#  • CONFIG_KALLSYMS_ALL=y
#  Ці три рядки додаються автоматично кроком нижче.
#
#  ІНСТРУКЦІЯ:
#  1. Створи новий публічний репозиторій на GitHub
#  2. Помісти цей файл: .github/workflows/build.yml
#  3. Actions → "Build SukiSU Ultra + SUSFS + KPM" → Run workflow
#  4. Завантаж ZIP з Artifacts після завершення (~40-70 хв)
#  5. Прошивай через TWRP
#  6. Manager APK: https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases
#
#  УВАГА: KPM для 4.14 є експериментальним. Якщо пристрій не
#  завантажується — прошивай стоковий boot.img через fastboot.
# ============================================================

name: Build SukiSU Ultra + SUSFS + KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: "joyeuse | sm6250 | SukiSU+SUSFS+KPM"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Крок 1: Клонуємо ядро окремо щоб патчити конфіг ──────
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            --branch sixteen-qpr2 \
            https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 \
            kernel

      # ── Крок 2: Інтегруємо SukiSU Ultra (гілка susfs-main) ───
      # susfs-main = SukiSU + вбудований SUSFS, без додаткових патчів
      - name: Integrate SukiSU Ultra (susfs-main = SukiSU + SUSFS)
        run: |
          cd kernel
          curl -LSs \
            "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
            | bash -s susfs-main
          echo "✅ SukiSU Ultra (susfs-main) integrated"

      # ── Крок 3: Додаємо KPM + KALLSYMS до defconfig ──────────
      # CONFIG_KPM=y          — вмикає Kernel Patch Module
      # CONFIG_KALLSYMS=y     — потрібно для KPM на non-GKI
      # CONFIG_KALLSYMS_ALL=y — потрібно для KPM на non-GKI
      - name: Enable KPM + KALLSYMS in defconfig
        run: |
          DEFCONFIG="kernel/arch/arm64/configs/cust_defconfig"
          echo "" >> "$DEFCONFIG"
          echo "# SukiSU Ultra KPM support" >> "$DEFCONFIG"
          grep -q "CONFIG_KPM" "$DEFCONFIG" \
            || echo "CONFIG_KPM=y" >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS=y" "$DEFCONFIG" \
            || echo "CONFIG_KALLSYMS=y" >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS_ALL" "$DEFCONFIG" \
            || echo "CONFIG_KALLSYMS_ALL=y" >> "$DEFCONFIG"
          echo "✅ KPM + KALLSYMS enabled in defconfig"
          echo "--- Tail of defconfig ---"
          tail -10 "$DEFCONFIG"

      # ── Крок 4: Збираємо ядро через kernel_build_action ──────
      # kernel-url вказує на локальний клонований каталог (./kernel)
      # ksu: false — бо ми вже вручну інтегрували SukiSU вище
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel
          kernel-dir: kernel

          arch: arm64
          config: cust_defconfig

          # AOSP toolchain — стабільний для 4.14 non-GKI
          aosp-clang: true
          aosp-clang-version: r450784d
          aosp-gcc: true
          android-version: 12

          # SukiSU вже інтегровано вище вручну
          ksu: false

          # Пакуємо в AnyKernel3 ZIP для TWRP
          anykernel3: true
          anykernel3-url: https://github.com/osm0sis/AnyKernel3
          anykernel3-branch: master

      # ── Крок 5: Зберігаємо артефакт ──────────────────────────
      - name: Upload kernel ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "SukiSU-SUSFS-KPM-joyeuse-${{ github.run_number }}"
          path: "*.zip"
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "=================================="
          echo "  Build Summary"
          echo "=================================="
          echo "  Device  : Redmi Note 9 Pro (joyeuse)"
          echo "  Kernel  : sm6250 sixteen-qpr2 (4.14)"
          echo "  SukiSU  : susfs-main branch"
          echo "  SUSFS   : вбудований (в susfs-main)"
          echo "  KPM     : CONFIG_KPM=y"
          echo "  KALLSYMS: CONFIG_KALLSYMS=y + ALL=y"
          echo ""
          echo "  Manager APK:"
          echo "  https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases"
          echo ""
          echo "  ⚠️  KPM на 4.14 — експериментально!"
          echo "  Завжди майте резервну копію boot.img"
