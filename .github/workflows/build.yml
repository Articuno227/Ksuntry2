name: Build SukiSU Ultra

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_DIR: ~/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPILERCHECK: content

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git bc bison flex libssl-dev make libelf-dev zip curl python3 lz4 zstd gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf clang-14 lld-14 llvm-14 ccache
          clang-14 --version
          ccache --version

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 kernel_source

      - name: Integrate SukiSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main

      - name: Enable KPM
        run: |
          D="kernel_source/arch/arm64/configs/cust_defconfig"
          grep -q "CONFIG_KPM=y" "$D" || echo "CONFIG_KPM=y" >> "$D"
          grep -q "CONFIG_KALLSYMS=y" "$D" || echo "CONFIG_KALLSYMS=y" >> "$D"
          grep -q "CONFIG_KALLSYMS_ALL=y" "$D" || echo "CONFIG_KALLSYMS_ALL=y" >> "$D"
          tail -20 "$D"

      # Розумне кешування компілятора для блискавичних повторних білдів
      - name: Reset and Optimize Cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-sm6250-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-sm6250-

      - name: Build
        run: |
          cd kernel_source
          make O=out ARCH=arm64 cust_defconfig

          # 1. Перевірений асемблерний фікс
          sed -i 's/.*ValidContext.*/ValidContext:/g' arch/arm64/kernel/entry.S

          # 2. Форсуємо збірку susfs.o безпосередньо через Makefile файлової системи
          if [ -f fs/Makefile ]; then
            echo "" >> fs/Makefile
            echo "obj-y += susfs.o" >> fs/Makefile
            echo "✓ Форсування лінкування SUSFS виконано."
          fi

          # Скидання статистики кешу перед початком
          ccache -z

          # 3. Запуск компіляції. Інтегруємо ccache у виклик Clang
          # Повністю видалено проблемний макрос із дужками з KCFLAGS
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="ccache clang-14 -DValidContext= -DValidContext:= -DBIO_MAX_PAGES=256 -Wno-implicit-function-declaration -Wno-error" \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=0 \
            KCFLAGS="-Dcompat_uptr_t=__u32 -Wno-error" \
            AFLAGS="-Wa,-W" \
            Image dtbs 2>&1 | tee ../build.log || true
            
          # Виведемо статус кешування в лог комміту
          ccache -s
          
          grep -i "error:" ../build.log | head -30 || true
          
          echo "=== Перевірка вихідних файлів ==="
          ls -lh out/arch/arm64/boot/ || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 3

      - name: Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          if [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            echo "✓ Знайдено нестиснуте ядро Image, стискаємо в Image.gz..."
            gzip -c9 kernel_source/out/arch/arm64/boot/Image > AnyKernel3/Image.gz
          elif [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            echo "✓ Знайдено готове Image.gz, копіюємо..."
            cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          elif [ -f kernel_source/out/arch/arm64/boot/Image-dtb ]; then
            echo "✓ Знайдено вшитий Image-dtb, стискаємо в Image.gz..."
            gzip -c9 kernel_source/out/arch/arm64/boot/Image-dtb > AnyKernel3/Image.gz
          else
            echo "❌ КРИТИЧНА ПОМИЛКА: жодного файлу ядра не знайдено!"
            exit 1
          fi

          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" -exec cat {} >> AnyKernel3/dtb \; 2>/dev/null || true

          cd AnyKernel3
          zip -r9 "../SukiSU-joyeuse.zip" . -x ".git*"
          cd ..
          ls -lh *.zip

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-joyeuse-${{ github.run_number }}
          path: ./*.zip
          retention-days: 5
