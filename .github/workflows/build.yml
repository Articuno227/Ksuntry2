# ============================================================
#  Build SukiSU Ultra + SUSFS + KPM
#  Device: Redmi Note 9 Pro (joyeuse) | sm6250 | 4.14 non-GKI
#  ROM: PixelOS sixteen-qpr2
# ============================================================

name: Build SukiSU Ultra + SUSFS + KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: "joyeuse | sm6250 | SukiSU+SUSFS+KPM"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git bc bison flex libssl-dev make \
            libelf-dev zip curl python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            lz4 zstd

      # ── Клонуємо ядро ─────────────────────────────────────────
      - name: Clone kernel
        run: |
          git clone --depth=1 \
            --branch sixteen-qpr2 \
            https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 \
            kernel_source

      # ── Інтегруємо SukiSU Ultra з SUSFS ──────────────────────
      - name: Integrate SukiSU Ultra (susfs-main)
        run: |
          cd kernel_source
          curl -LSs \
            "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
            | bash -s susfs-main
          echo "✅ SukiSU Ultra (susfs-main) integrated"

      # ── Додаємо KPM + KALLSYMS у defconfig ───────────────────
      - name: Enable KPM in defconfig
        run: |
          DEFCONFIG="kernel_source/arch/arm64/configs/cust_defconfig"
          echo "" >> "$DEFCONFIG"
          echo "# SukiSU KPM" >> "$DEFCONFIG"
          grep -q "CONFIG_KPM=y"          "$DEFCONFIG" || echo "CONFIG_KPM=y"          >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS=y"     "$DEFCONFIG" || echo "CONFIG_KALLSYMS=y"     >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS_ALL=y" "$DEFCONFIG" || echo "CONFIG_KALLSYMS_ALL=y" >> "$DEFCONFIG"
          echo "✅ KPM flags added"
          tail -6 "$DEFCONFIG"

      # ── Завантажуємо Clang (ZyCromerZ — надійне джерело) ─────
      # ── Завантажуємо Clang (AOSP Clang 14 — стабільний для 4.14) ──
      - name: Download Clang toolchain
        run: |
          mkdir -p clang
          # Використовуємо стабільний Google AOSP Clang r450784d (Clang 14.0.6)
          wget -q --show-progress \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz" \
            -O clang.tar.gz
          tar -xf clang.tar.gz -C clang
          rm clang.tar.gz
          echo "✅ Clang ready"
          clang/bin/clang --version

      # ── Завантажуємо GCC ──────────────────────────────────────
      - name: Download GCC toolchains
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            gcc64
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            gcc32
          echo "✅ GCC ready"

      # ── Збірка ядра ───────────────────────────────────────────
      - name: Build kernel
        run: |
          export PATH="$(pwd)/clang/bin:$(pwd)/gcc64/bin:$(pwd)/gcc32/bin:$PATH"

          cd kernel_source

          # Генеруємо .config з defconfig
          make O=out ARCH=arm64 cust_defconfig

          # Компілюємо
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image.gz dtbo.img 2>&1 | tail -50

          echo "--- Boot artifacts ---"
          ls -lh out/arch/arm64/boot/

      # ── Пакуємо в AnyKernel3 ZIP ──────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3 \
            AnyKernel3

          # Вимикаємо перевірку пристрою (для будь-якого joyeuse)
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

          # DTB
          find kernel_source/out/arch/arm64/boot/dts \
            -name "*.dtb" -exec cat {} >> AnyKernel3/dtb \; 2>/dev/null || true

          ZIP_NAME="SukiSU-SUSFS-KPM-joyeuse-$(date +%Y%m%d-%H%M).zip"
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x ".git*"
          cd ..

          echo "✅ ZIP: $ZIP_NAME"
          ls -lh *.zip

      # ── Зберігаємо артефакт ───────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "SukiSU-SUSFS-KPM-joyeuse-${{ github.run_number }}"
          path: "*.zip"
          retention-days: 7
