name: Build SukiSU Ultra

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 5G
  CCACHE_COMPILERCHECK: content

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git bc bison flex libssl-dev make libelf-dev zip curl python3 lz4 zstd gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf clang-14 lld-14 llvm-14 ccache perl
          ccache -M 5G
          
      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 kernel_source

      - name: Integrate SukiSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main
          
      - name: Enable KPM & Fix Config
        run: |
          cd kernel_source
          D="arch/arm64/configs/cust_defconfig"
          
          echo "CONFIG_KPM=y" >> "$D"
          echo "CONFIG_KALLSYMS=y" >> "$D"
          echo "CONFIG_KALLSYMS_ALL=y" >> "$D"
          
          # Вмикаємо BPF (для Android 16)
          sed -i '/CONFIG_BPF=/d' "$D"
          echo "CONFIG_BPF=y" >> "$D"
          sed -i '/CONFIG_BPF_SYSCALL=/d' "$D"
          echo "CONFIG_BPF_SYSCALL=y" >> "$D"
          
          # ВМИКАЄМО PREEMPT ТА RCU (Вирішує корінь проблеми tasks.h)
          sed -i '/CONFIG_PREEMPT_NONE=y/d' "$D"
          sed -i '/CONFIG_PREEMPT_VOLUNTARY=y/d' "$D"
          echo "CONFIG_PREEMPT=y" >> "$D"
          echo "CONFIG_TASKS_RCU=y" >> "$D"
          echo "CONFIG_TASKS_TRACE_RCU=y" >> "$D"
          echo "CONFIG_TASKS_RUDE_RCU=y" >> "$D"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-kernel-sm6250-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-sm6250-

      - name: Apply Bulletproof Patches
        run: |
          cd kernel_source
          if [ -f arch/arm64/kernel/entry.S ]; then sed -i 's/.*ValidContext.*/ValidContext:/g' arch/arm64/kernel/entry.S; fi
          if [ -f arch/arm64/kernel/sys.c ]; then sed -i 's/.*ValidContext.*//g' arch/arm64/kernel/sys.c; fi
          if [ -f include/trace/events/sched.h ]; then sed -i '/Unsupported NR_CPUS/d' include/trace/events/sched.h; fi
          if [ -f drivers/md/dm-user.c ]; then sed -i 's/BIO_MAX_PAGES/256/g' drivers/md/dm-user.c; fi
          if [ -f fs/Makefile ]; then grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile; fi

          # Фікс: NOHZ_BALANCE_KICK
          if [ -f kernel/sched/core.c ]; then
            sed -i '1i #ifndef NOHZ_BALANCE_KICK\n#define NOHZ_BALANCE_KICK 0\n#endif' kernel/sched/core.c
          fi

          # Фікс: Power Supply (Використовуємо Perl для безвідмовного вставлення масиву прямо в union)
          FILE_PS_H="include/linux/power_supply.h"
          if [ -f "$FILE_PS_H" ]; then
            perl -pi -e 's/(union power_supply_propval \{)/$1\n\tu8 arrayval[16];/g' "$FILE_PS_H"
          fi
          
          FILE_PS="drivers/power/supply/power_supply_sysfs.c"
          if [ -f "$FILE_PS" ]; then
            sed -i '/#include <linux\/power_supply.h>/a #ifndef POWER_SUPPLY_PROP_ROMID\n#define POWER_SUPPLY_PROP_ROMID 100\n#define POWER_SUPPLY_PROP_DS_STATUS 101\n#define POWER_SUPPLY_PROP_PAGE0_DATA 102\n#define POWER_SUPPLY_PROP_PAGE1_DATA 103\n#define POWER_SUPPLY_PROP_PAGEDATA 104\n#define POWER_SUPPLY_PROP_VERIFY_MODEL_NAME 105\n#endif' "$FILE_PS"
          fi

      - name: Build
        run: |
          cd kernel_source
          make O=out ARCH=arm64 cust_defconfig

          ccache -z
          
          # Запуск компіляції
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="ccache clang-14" \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=0 \
            KCFLAGS="-Dcompat_uptr_t=__u32 -Wno-implicit-function-declaration -Wno-error -DFULL_THROTTLE_BOOST=0 -DNOHZ_BALANCE_KICK=0" \
            AFLAGS="-Wa,-W" \
            Image dtbs 2>&1 | tee ../build.log || true
            
          ccache -s
          
          echo "=== Перевірка помилок ==="
          grep -i "error:" ../build.log | head -30 || true
          
          echo "=== Перевірка вихідних файлів ==="
          ls -lh out/arch/arm64/boot/ || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 3

      - name: Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          if [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            gzip -c9 kernel_source/out/arch/arm64/boot/Image > AnyKernel3/Image.gz
          elif [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          elif [ -f kernel_source/out/arch/arm64/boot/Image-dtb ]; then
            gzip -c9 kernel_source/out/arch/arm64/boot/Image-dtb > AnyKernel3/Image.gz
          else
            echo "❌ КРИТИЧНА ПОМИЛКА: жодного файлу ядра не знайдено!"
            exit 1
          fi

          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" -exec cat {} >> AnyKernel3/dtb \; 2>/dev/null || true

          cd AnyKernel3
          zip -r9 "../SukiSU-joyeuse.zip" . -x ".git*"
          cd ..

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-joyeuse-${{ github.run_number }}
          path: ./*.zip
          retention-days: 5
