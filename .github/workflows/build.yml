name: Build SukiSU Ultra

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_DIR: ~/.ccache
  CCACHE_MAXSIZE: 5G
  CCACHE_COMPILERCHECK: content

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git bc bison flex libssl-dev make libelf-dev zip curl python3 lz4 zstd gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf clang-14 lld-14 llvm-14 ccache
          ccache -M 5G

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 kernel_source

      - name: Integrate SukiSU
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main

      - name: Apply Structural Fixes (Python Smart Patch)
        run: |
          cd kernel_source
          
          cat << 'EOF' > smart_patch.py
          import os

          # 1. Виправлення затертого сусфсом power_supply.h
          ps_path = 'include/linux/power_supply.h'
          if os.path.exists(ps_path):
              print("Патчимо power_supply.h...")
              with open(ps_path, 'r') as f:
                  content = f.read()
              
              if 'arrayval' not in content:
                  content = content.replace('int intval;', 'int intval;\n\tu8 arrayval[16];')
              
              if 'POWER_SUPPLY_PROP_ROMID' not in content:
                  if 'POWER_SUPPLY_PROP_CAPACITY,' in content:
                      content = content.replace('POWER_SUPPLY_PROP_CAPACITY,', 'POWER_SUPPLY_PROP_CAPACITY,\n\tPOWER_SUPPLY_PROP_ROMID,\n\tPOWER_SUPPLY_PROP_DS_STATUS,')
                  else:
                      content = content.replace('POWER_SUPPLY_PROP_STATUS,', 'POWER_SUPPLY_PROP_STATUS,\n\tPOWER_SUPPLY_PROP_ROMID,\n\tPOWER_SUPPLY_PROP_DS_STATUS,')
              
              with open(ps_path, 'w') as f:
                  f.write(content)

          # 2. Розумне лікування та ізоляція kernel/rcu/tasks.h
          rcu_path = 'kernel/rcu/tasks.h'
          if os.path.exists(rcu_path):
              print("Патчимо tasks.h...")
              with open(rcu_path, 'r') as f:
                  lines = f.readlines()
              
              new_lines = []
              new_lines.append("#ifndef _FIXED_RCU_TASKS_H\n")
              new_lines.append("#define _FIXED_RCU_TASKS_H\n")
              
              for i, line in enumerate(lines):
                  ln = i + 1
                  
                  # Прибираємо зламані макроси (наприклад #define 1 або #define y)
                  if line.strip().startswith("#define"):
                      parts = line.split()
                      if len(parts) > 1 and parts[1][0].isdigit():
                          line = "// " + line
                  
                  # Виправлення помилки присвоєння void до int (рядки 320-330 та 510-530)
                  if ln in range(315, 335) or ln in range(480, 540):
                      if '=' in line and '(' in line and 'if' not in line and 'while' not in line and 'return' not in line:
                          parts = line.split('=', 1)
                          indent = line[:len(line) - len(line.lstrip())]
                          line = indent + parts[1].strip() + "\n"
                          
                  new_lines.append(line)
                  
              new_lines.append("#endif\n")
              
              with open(rcu_path, 'w') as f:
                  f.writelines(new_lines)

          # 3. Вирізання помилки NR_CPUS у sched.h
          sched_path = 'include/trace/events/sched.h'
          if os.path.exists(sched_path):
              print("Патчимо sched.h...")
              with open(sched_path, 'r') as f:
                  s_content = f.read()
              s_content = s_content.replace('#error "Unsupported NR_CPUS for lb tracepoint."', '// #error "Unsupported NR_CPUS for lb tracepoint."')
              with open(sched_path, 'w') as f:
                  f.write(s_content)
          EOF
          
          python3 smart_patch.py

      - name: Enable KPM & Fix Config
        run: |
          cd kernel_source
          D="arch/arm64/configs/cust_defconfig"
          echo "CONFIG_KPM=y" >> "$D"
          echo "CONFIG_KALLSYMS=y" >> "$D"
          echo "CONFIG_KALLSYMS_ALL=y" >> "$D"
          echo "CONFIG_BPF=y" >> "$D"
          echo "CONFIG_BPF_SYSCALL=y" >> "$D"
          echo "CONFIG_PREEMPT=y" >> "$D"
          echo "CONFIG_TASKS_RCU=y" >> "$D"

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-sm6250-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-sm6250-

      - name: Build
        run: |
          cd kernel_source
          make O=out ARCH=arm64 cust_defconfig
          ccache -z
          
          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang-14" \
            LD=ld.lld-14 \
            AR=llvm-ar-14 \
            NM=llvm-nm-14 \
            OBJCOPY=llvm-objcopy-14 \
            OBJDUMP=llvm-objdump-14 \
            STRIP=llvm-strip-14 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=0 \
            KCFLAGS="-Dcompat_uptr_t=__u32 -Wno-implicit-function-declaration -Wno-error" \
            Image dtbs 2>&1 | tee ../build.log || true
          
          echo "=== Перевірка помилок ==="
          grep -i "error:" ../build.log | head -20 || true
          
          echo "=== Перевірка вихідних файлів ==="
          ls -lh out/arch/arm64/boot/ || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 3

      - name: Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          if [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            gzip -c9 kernel_source/out/arch/arm64/boot/Image > AnyKernel3/Image.gz
          elif [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          elif [ -f kernel_source/out/arch/arm64/boot/Image-dtb ]; then
            gzip -c9 kernel_source/out/arch/arm64/boot/Image-dtb > AnyKernel3/Image.gz
          else
            echo "❌ КРИТИЧНА ПОМИЛКА: жодного файлу ядра не знайдено!"
            exit 1
          fi

          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} AnyKernel3/ \;
          
          cd AnyKernel3
          zip -r9 "../SukiSU-joyeuse.zip" . -x ".git*"
          cd ..

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-joyeuse-${{ github.run_number }}
          path: ./*.zip
          retention-days: 5
