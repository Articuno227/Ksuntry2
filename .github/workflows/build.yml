# ============================================================
#  Build SukiSU Ultra + SUSFS + KPM
#  Device: Redmi Note 9 Pro (joyeuse) | sm6250 | 4.14 non-GKI
#  ROM: PixelOS sixteen-qpr2
# ============================================================

name: Build SukiSU Ultra + SUSFS + KPM

on:
  workflow_dispatch:

jobs:
  build:
    name: "joyeuse | sm6250 | SukiSU+SUSFS+KPM"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git bc bison flex libssl-dev make \
            libelf-dev zip curl python3 ccache \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      # ── Клонуємо ядро ─────────────────────────────────────────
      - name: Clone kernel
        run: |
          git clone --depth=1 \
            --branch sixteen-qpr2 \
            https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6250 \
            kernel_source

      # ── Інтегруємо SukiSU Ultra з SUSFS ──────────────────────
      - name: Integrate SukiSU Ultra (susfs-main)
        run: |
          cd kernel_source
          curl -LSs \
            "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
            | bash -s susfs-main
          echo "✅ SukiSU Ultra (susfs-main) integrated"

      # ── Додаємо KPM + KALLSYMS у defconfig ───────────────────
      - name: Enable KPM in defconfig
        run: |
          DEFCONFIG="kernel_source/arch/arm64/configs/cust_defconfig"
          echo "" >> "$DEFCONFIG"
          echo "# SukiSU KPM" >> "$DEFCONFIG"
          grep -q "CONFIG_KPM=y"          "$DEFCONFIG" || echo "CONFIG_KPM=y"          >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS=y"     "$DEFCONFIG" || echo "CONFIG_KALLSYMS=y"     >> "$DEFCONFIG"
          grep -q "CONFIG_KALLSYMS_ALL=y" "$DEFCONFIG" || echo "CONFIG_KALLSYMS_ALL=y" >> "$DEFCONFIG"
          echo "✅ KPM flags added"
          tail -6 "$DEFCONFIG"

      # ── Завантажуємо Clang toolchain ──────────────────────────
      - name: Download Clang
        run: |
          mkdir -p clang
          wget -q \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz" \
            -O clang.tar.gz || \
          wget -q \
            "https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20220612-release/Clang-14.0.6-20220612.tar.gz" \
            -O clang.tar.gz
          tar -xf clang.tar.gz -C clang
          echo "✅ Clang downloaded"
          ls clang/bin/clang* 2>/dev/null | head -3 || echo "clang path: $(find clang -name 'clang' -type f | head -1)"

      # ── Завантажуємо GCC ──────────────────────────────────────
      - name: Download GCC
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            gcc64
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            gcc32
          echo "✅ GCC downloaded"

      # ── Збірка ядра ───────────────────────────────────────────
      - name: Build kernel
        run: |
          CLANG_PATH="$(pwd)/clang/bin"
          GCC64_PATH="$(pwd)/gcc64/bin"
          GCC32_PATH="$(pwd)/gcc32/bin"

          export PATH="$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH"

          cd kernel_source

          # Визначаємо компілятор
          CLANG_BIN=$(find "$CLANG_PATH" -name "clang" -type f | head -1)
          echo "Using clang: $CLANG_BIN"

          make O=out ARCH=arm64 cust_defconfig

          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 LLVM_IAS=1 \
            Image.gz dtbo.img 2>&1 | tee build.log

          echo "✅ Build done"
          ls out/arch/arm64/boot/

      # ── Пакуємо в AnyKernel3 ZIP ──────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3 \
            AnyKernel3

          # Прибираємо приклади пристроїв з AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh

          cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

          # Збираємо DTB якщо є
          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" \
            -exec cat {} >> AnyKernel3/dtb \; 2>/dev/null || true

          cd AnyKernel3
          zip -r9 \
            "../SukiSU-SUSFS-KPM-joyeuse-$(date +%Y%m%d-%H%M).zip" \
            . -x ".git*"

          cd ..
          echo "✅ ZIP created"
          ls -lh *.zip

      # ── Зберігаємо артефакт ───────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "SukiSU-SUSFS-KPM-joyeuse-${{ github.run_number }}"
          path: "*.zip"
          retention-days: 7
